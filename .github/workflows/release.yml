# Publishes the plugin to JetBrains Marketplace when a GitHub release is created.
#
# Required repository secrets:
#   PUBLISH_TOKEN          - JetBrains Marketplace personal access token
#   CERTIFICATE_CHAIN      - Plugin signing certificate chain (PEM, base64-encoded)
#   PRIVATE_KEY            - Plugin signing private key (PEM, base64-encoded)
#   PRIVATE_KEY_PASSWORD   - Password for the private key

name: Release

on:
  release:
    types: [prereleased, released]

jobs:
  publish:
    name: Publish Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish Plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin
